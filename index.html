  <script type="module" src="/src/main.jsx"></script>

  <style>
    #initial-loader {
      position: fixed;
      inset: 0;
      background: #0b0b0b;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loader-logo {
      width: 96px;
      height: 96px;
      opacity: 0.85;
      animation: softPulse 1.8s ease-in-out infinite;
    }

    @keyframes softPulse {
      0% {
        transform: scale(0.96);
        opacity: 0.6;
      }
      50% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(0.96);
        opacity: 0.6;
      }
    }

    #initial-loader.hide {
      opacity: 0;
      visibility: hidden;
    }
  </style>
